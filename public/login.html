<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Money Tree 2.0 · Sign in</title>
  <style>
    :root {
      --bg:       #F6F3EC;
      --card:     #FFFFFF;
      --border:   #DDD9D0;
      --text:     #161B22;
      --muted:    #8B909A;
      --text-dim: #4A5562;
      --accent:   #1F3A5F;
      --bad:      #B3261E;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 18px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(31,58,95,0.06), transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(27,127,59,0.04), transparent 40%);
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      width: min(400px, 92vw);
      text-align: center;
      box-shadow: 0 8px 32px rgba(22,27,34,0.10);
    }
    .logo {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: 3px;
      background: linear-gradient(90deg, #1F3A5F 0%, #1B7F3B 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }
    .tagline {
      color: var(--muted);
      font-size: 14px;
      letter-spacing: 0.5px;
      margin-bottom: 36px;
    }
    .field {
      margin-bottom: 18px;
      text-align: left;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 7px;
    }
    input {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 13px 14px;
      color: var(--text);
      font-size: 17px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: var(--accent); }
    input[type="password"] { letter-spacing: 6px; font-size: 20px; }
    .btn {
      width: 100%;
      background: var(--accent);
      color: #FFFFFF;
      border: none;
      border-radius: 8px;
      padding: 14px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.15s, transform 0.15s;
    }
    .btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
    .err {
      margin-top: 16px;
      color: var(--bad);
      font-size: 15px;
      min-height: 20px;
    }
    .footer {
      margin-top: 28px;
      color: var(--muted);
      font-size: 13px;
    }
    .refresh-btn {
      position: fixed; top: 14px; right: 14px;
      background: rgba(0,0,0,0.05); border: 1px solid var(--border);
      color: var(--muted); border-radius: 8px; padding: 6px 12px;
      font-size: 14px; cursor: pointer; transition: background 0.15s;
    }
    .refresh-btn:hover { background: rgba(0,0,0,0.09); color: var(--text); }
  </style>
</head>
<body>
  <button class="refresh-btn" onclick="location.reload(true)">↺ Refresh</button>
  <div class="card">
    <div class="logo">Money Tree 2.0</div>
    <div class="tagline">Strikeout Intelligence</div>

    <form id="loginForm">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username"
               placeholder="Enter username" autofocus/>
      </div>
      <div class="field">
        <label for="pin">PIN</label>
        <input type="password" id="pin" name="pin" autocomplete="current-password"
               placeholder="••••" maxlength="10" inputmode="numeric"/>
      </div>
      <button class="btn" type="submit" id="submitBtn">Sign In</button>
    </form>

    <div class="err" id="err"></div>
    <div class="footer">Authorized access only</div>
    <div class="footer" id="deploy-date" style="margin-top:6px;opacity:.5;font-size:12px"></div>
  </div>

  <script>
    fetch('/api/deploy-date').then(r=>r.json()).then(d => {
      const el = document.getElementById('deploy-date')
      if (el) el.textContent = 'Deployed ' + d.date
    }).catch(()=>{})

    const form = document.getElementById('loginForm')
    const errEl = document.getElementById('err')
    const btn = document.getElementById('submitBtn')

    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      errEl.textContent = ''
      btn.disabled = true
      btn.textContent = 'Signing in...'

      const username = document.getElementById('username').value.trim()
      const pin = document.getElementById('pin').value.trim()

      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, pin }),
        })
        const data = await res.json()
        if (res.ok && data.ok) {
          window.location.href = '/'
        } else {
          errEl.textContent = data.error || 'Invalid username or PIN.'
          btn.disabled = false
          btn.textContent = 'Sign In'
        }
      } catch {
        errEl.textContent = 'Network error. Try again.'
        btn.disabled = false
        btn.textContent = 'Sign In'
      }
    })
  </script>
</body>
</html>
