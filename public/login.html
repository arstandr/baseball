<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Money Tree 2.0 · Sign in</title>
  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --muted: #8b949e;
      --accent: #58a6ff;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(88,166,255,0.08), transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(63,185,113,0.06), transparent 40%);
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      width: min(400px, 92vw);
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .logo {
      font-size: 40px;
      font-weight: 800;
      letter-spacing: 4px;
      background: linear-gradient(90deg, #58a6ff 0%, #3fb950 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }
    .tagline {
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 36px;
    }
    .field {
      margin-bottom: 16px;
      text-align: left;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: var(--accent); }
    input[type="password"] { letter-spacing: 6px; font-size: 18px; }
    .btn {
      width: 100%;
      background: var(--accent);
      color: #0d1117;
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.15s, transform 0.15s;
      letter-spacing: 0.5px;
    }
    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .err {
      margin-top: 16px;
      color: #f85149;
      font-size: 13px;
      min-height: 18px;
    }
    .footer {
      margin-top: 32px;
      color: #484f58;
      font-size: 11px;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">MLBIE</div>
    <div class="tagline">Betting Intelligence Engine</div>

    <form id="loginForm">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username"
               placeholder="Enter username" autofocus/>
      </div>
      <div class="field">
        <label for="pin">PIN</label>
        <input type="password" id="pin" name="pin" autocomplete="current-password"
               placeholder="••••" maxlength="10" inputmode="numeric"/>
      </div>
      <button class="btn" type="submit" id="submitBtn">Sign In</button>
    </form>

    <div class="err" id="err"></div>
    <div class="footer">Authorized access only</div>
  </div>

  <script>
    const form = document.getElementById('loginForm')
    const errEl = document.getElementById('err')
    const btn = document.getElementById('submitBtn')

    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      errEl.textContent = ''
      btn.disabled = true
      btn.textContent = 'Signing in...'

      const username = document.getElementById('username').value.trim()
      const pin = document.getElementById('pin').value.trim()

      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, pin }),
        })
        const data = await res.json()
        if (res.ok && data.ok) {
          window.location.href = '/'
        } else {
          errEl.textContent = data.error || 'Invalid username or PIN.'
          btn.disabled = false
          btn.textContent = 'Sign In'
        }
      } catch {
        errEl.textContent = 'Network error. Try again.'
        btn.disabled = false
        btn.textContent = 'Sign In'
      }
    })
  </script>
</body>
</html>
